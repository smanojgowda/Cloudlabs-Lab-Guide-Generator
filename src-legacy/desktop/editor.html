<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spektra Screenshot Editor</title>
  <style>
    :root {
      --spektra: #7c3aed; --spektra-hover: #6d28d9; --spektra-light: #a78bfa;
      --bg-dark: #0d1117; --bg-panel: #161b22; --bg-elevated: #21262d;
      --border: #30363d; --text-primary: #e6edf3; --text-secondary: #8b949e;
      --danger: #f85149; --success: #3fb950; --warning: #d29922; --info: #58a6ff;
      --radius: 8px; --radius-sm: 5px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg-dark); color: var(--text-primary); font-family: 'Segoe UI', sans-serif; display: flex; height: 100vh; overflow: hidden; user-select: none; }

    /* ─── Left Toolbar (Snagit-style vertical) ─── */
    #sidebar {
      width: 52px; background: var(--bg-panel); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; align-items: center; padding: 8px 0; gap: 2px;
      overflow-y: auto; flex-shrink: 0;
    }
    #sidebar button {
      width: 40px; height: 36px; background: transparent; color: var(--text-secondary);
      border: 1px solid transparent; border-radius: var(--radius-sm); cursor: pointer;
      font-size: 16px; display: flex; align-items: center; justify-content: center;
      transition: all .15s; position: relative;
    }
    #sidebar button:hover { background: var(--bg-elevated); color: var(--text-primary); }
    #sidebar button.active { background: var(--spektra); color: #fff; border-color: var(--spektra); }
    #sidebar button.active.tool-eraser { background: var(--danger); border-color: var(--danger); }
    #sidebar button[title]:hover::after {
      content: attr(title); position: absolute; left: 48px; top: 50%; transform: translateY(-50%);
      background: #333; color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px;
      white-space: nowrap; z-index: 999; pointer-events: none;
    }
    .sidebar-sep { width: 32px; height: 1px; background: var(--border); margin: 4px 0; }

    /* ─── Main area ─── */
    #main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* ─── Top Property Bar ─── */
    #propbar {
      display: flex; gap: 10px; padding: 8px 14px; background: var(--bg-panel);
      border-bottom: 1px solid var(--border); align-items: center; flex-wrap: wrap; min-height: 44px;
    }
    #propbar label { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .5px; }
    #propbar input[type="color"] { width: 28px; height: 24px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg-dark); cursor: pointer; padding: 1px; }
    #propbar input[type="number"], #propbar input[type="range"], #propbar select {
      background: var(--bg-dark); color: var(--text-primary); border: 1px solid var(--border);
      border-radius: 4px; padding: 3px 6px; font-size: 12px;
    }
    #propbar select { padding: 3px 4px; cursor: pointer; }
    #propbar input[type="number"] { width: 52px; }
    #propbar input[type="range"] { width: 80px; }
    .prop-group { display: flex; align-items: center; gap: 4px; }
    .prop-sep { width: 1px; height: 24px; background: var(--border); }

    /* Action buttons */
    .btn-action { background: var(--bg-elevated) !important; color: var(--text-primary) !important; border: 1px solid var(--border) !important; border-radius: var(--radius-sm) !important; padding: 5px 12px !important; cursor: pointer !important; font-size: 12px !important; font-weight: 600 !important; transition: .15s !important; }
    .btn-action:hover { background: var(--border) !important; }
    .btn-save { background: var(--spektra) !important; color: #fff !important; border-color: var(--spektra) !important; }
    .btn-save:hover { background: var(--spektra-hover) !important; }
    .btn-cancel { color: var(--danger) !important; border-color: var(--danger) !important; background: transparent !important; }
    .btn-cancel:hover { background: var(--danger) !important; color: #fff !important; }

    /* ─── Canvas area ─── */
    #canvas-area {
      flex: 1; display: flex; align-items: center; justify-content: center;
      overflow: auto; padding: 16px; position: relative;
    }
    #editor-canvas {
      cursor: crosshair; border: 2px solid var(--border); border-radius: var(--radius-sm);
      background: #000; box-shadow: 0 4px 24px rgba(0,0,0,.4);
    }

    /* ─── Text input overlay ─── */
    #text-input-overlay {
      position: absolute; display: none; z-index: 100;
    }
    #text-input-overlay textarea {
      background: rgba(255,255,255,0.95); color: #000; border: 2px solid var(--spektra);
      border-radius: 4px; padding: 6px 8px; font-family: 'Segoe UI', Arial, sans-serif;
      resize: both; min-width: 120px; min-height: 36px; outline: none;
    }
    #text-input-overlay .text-actions { display: flex; gap: 4px; margin-top: 4px; }
    #text-input-overlay .text-actions button {
      padding: 3px 10px; font-size: 11px; border-radius: 3px; cursor: pointer; border: 1px solid var(--border);
    }
    #text-confirm { background: var(--spektra); color: #fff; border-color: var(--spektra); }
    #text-discard { background: var(--bg-elevated); color: var(--text-primary); }

    /* ─── Stamp picker popup ─── */
    #stamp-picker {
      position: absolute; display: none; background: var(--bg-panel); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 8px; z-index: 200; box-shadow: 0 8px 24px rgba(0,0,0,.5);
    }
    #stamp-picker .stamp-grid { display: grid; grid-template-columns: repeat(5, 40px); gap: 4px; }
    #stamp-picker .stamp-btn {
      width: 40px; height: 40px; background: var(--bg-elevated); border: 1px solid var(--border);
      border-radius: 4px; cursor: pointer; font-size: 20px; display: flex; align-items: center;
      justify-content: center; transition: .15s;
    }
    #stamp-picker .stamp-btn:hover { background: var(--spektra); color: #fff; }
    #stamp-picker .stamp-btn.selected { background: var(--spektra); color: #fff; border-color: var(--spektra); }

    /* ─── Status bar ─── */
    #statusbar {
      display: flex; justify-content: space-between; padding: 4px 14px; background: var(--bg-panel);
      border-top: 1px solid var(--border); font-size: 11px; color: var(--text-secondary);
    }

    /* Step preview badge */
    .next-step-preview {
      display: inline-flex; align-items: center; justify-content: center; width: 22px; height: 22px;
      background: #e03030; color: #fff; border-radius: 50%; font-size: 12px; font-weight: 700;
    }

    /* Zoom controls */
    .zoom-group { display: flex; align-items: center; gap: 4px; }
    .zoom-group button { width: 24px; height: 24px; background: var(--bg-elevated); border: 1px solid var(--border); border-radius: 3px; color: var(--text-primary); cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; }
    .zoom-group button:hover { background: var(--border); }
    #zoom-level { font-size: 11px; min-width: 36px; text-align: center; }
  </style>
</head>
<body>

<!-- ─── LEFT SIDEBAR: Tool palette ─── -->
<div id="sidebar">
  <button id="tool-select" title="Select / Move (V)">&#128070;</button>
  <div class="sidebar-sep"></div>
  <button id="tool-arrow" class="active" title="Arrow (A)">&#10132;</button>
  <button id="tool-line" title="Line (L)">&#9135;</button>
  <button id="tool-rect" title="Rectangle (R)">&#9645;</button>
  <button id="tool-ellipse" title="Ellipse (E)">&#9711;</button>
  <button id="tool-pen" title="Pen / Freehand (P)">&#9998;</button>
  <div class="sidebar-sep"></div>
  <button id="tool-text" title="Text (T)">T</button>
  <button id="tool-callout" title="Callout (C)">&#128172;</button>
  <div class="sidebar-sep"></div>
  <button id="tool-highlight" title="Highlight / Marker (H)">&#9646;</button>
  <button id="tool-blur" title="Blur (B)">&#128065;</button>
  <div class="sidebar-sep"></div>
  <button id="tool-step" title="Step Number (N)">&#9312;</button>
  <button id="tool-stamp" title="Stamp (S)">&#9733;</button>
  <div class="sidebar-sep"></div>
  <button id="tool-crop" title="Crop (X)">&#9986;</button>
  <button id="tool-eraser" class="tool-eraser" title="Eraser (D)">&#128465;</button>
  <button id="tool-eyedropper" title="Eyedropper (I)">&#128083;</button>
</div>

<!-- ─── MAIN CONTENT ─── -->
<div id="main">
  <!-- Property bar (context-sensitive) -->
  <div id="propbar">
    <div class="prop-group">
      <label>Stroke</label>
      <input type="color" id="prop-color" value="#ff0000" title="Stroke color">
    </div>
    <div class="prop-group" id="grp-fill">
      <label>Fill</label>
      <input type="color" id="prop-fill" value="#ffffff" title="Fill color">
      <select id="prop-fill-mode" title="Fill mode">
        <option value="none">None</option>
        <option value="solid">Solid</option>
        <option value="semi">50%</option>
      </select>
    </div>
    <div class="prop-group">
      <label>Width</label>
      <input type="number" id="prop-stroke-width" value="3" min="1" max="20">
    </div>
    <div class="prop-group" id="grp-font" style="display:none;">
      <label>Font</label>
      <select id="prop-font-family">
        <option value="Segoe UI">Segoe UI</option>
        <option value="Arial">Arial</option>
        <option value="Courier New">Courier New</option>
        <option value="Georgia">Georgia</option>
        <option value="Verdana">Verdana</option>
        <option value="Impact">Impact</option>
      </select>
      <input type="number" id="prop-font-size" value="18" min="8" max="120" style="width:48px;">
      <button class="btn-action" id="prop-bold" title="Bold" style="font-weight:900;padding:3px 8px!important;">B</button>
    </div>
    <div class="prop-group" id="grp-opacity" style="display:none;">
      <label>Opacity</label>
      <input type="range" id="prop-opacity" min="10" max="100" value="40">
      <span id="opacity-val" style="font-size:11px;min-width:28px;">40%</span>
    </div>
    <div class="prop-group" id="grp-blur-intensity" style="display:none;">
      <label>Blur</label>
      <input type="range" id="prop-blur-intensity" min="4" max="40" value="16">
      <span id="blur-val" style="font-size:11px;min-width:24px;">16</span>
    </div>
    <div class="prop-group" id="grp-step" style="display:none;">
      <label>Size</label>
      <input type="number" id="prop-step-size" value="28" min="14" max="80" style="width:55px;">
      <span class="next-step-preview" id="next-step-preview">1</span>
    </div>
    <div class="prop-group" id="grp-arrow-head" style="display:none;">
      <label>Head</label>
      <select id="prop-arrow-head">
        <option value="end">End</option>
        <option value="both">Both</option>
        <option value="none">None</option>
      </select>
    </div>

    <div style="flex:1;"></div>

    <div class="zoom-group">
      <button id="zoom-out" title="Zoom out">&#8722;</button>
      <span id="zoom-level">100%</span>
      <button id="zoom-in" title="Zoom in">&#43;</button>
      <button id="zoom-fit" title="Fit to window" style="font-size:11px;width:auto;padding:0 6px;">Fit</button>
    </div>
    <div class="prop-sep"></div>
    <button class="btn-action" id="btn-undo" title="Ctrl+Z">&#8630; Undo</button>
    <button class="btn-action" id="btn-redo" title="Ctrl+Y">&#8631; Redo</button>
    <div class="prop-sep"></div>
    <button class="btn-action btn-save" id="btn-save" title="Ctrl+S">&#10004; Save</button>
    <button class="btn-action btn-cancel" id="btn-cancel" title="Esc">&#10006; Cancel</button>
  </div>

  <!-- Canvas area -->
  <div id="canvas-area">
    <canvas id="editor-canvas"></canvas>

    <!-- Floating text input -->
    <div id="text-input-overlay">
      <textarea id="text-area" rows="2" cols="20" placeholder="Type here..."></textarea>
      <div class="text-actions">
        <button id="text-confirm">&#10004; OK</button>
        <button id="text-discard">&#10006;</button>
      </div>
    </div>

    <!-- Stamp picker -->
    <div id="stamp-picker">
      <div class="stamp-grid">
        <button class="stamp-btn selected" data-stamp="checkmark" title="Checkmark">&#10004;</button>
        <button class="stamp-btn" data-stamp="cross" title="Cross">&#10008;</button>
        <button class="stamp-btn" data-stamp="star" title="Star">&#9733;</button>
        <button class="stamp-btn" data-stamp="info" title="Info">&#8505;</button>
        <button class="stamp-btn" data-stamp="warning" title="Warning">&#9888;</button>
        <button class="stamp-btn" data-stamp="heart" title="Heart">&#10084;</button>
        <button class="stamp-btn" data-stamp="thumbsup" title="Thumbs Up">&#128077;</button>
        <button class="stamp-btn" data-stamp="thumbsdown" title="Thumbs Down">&#128078;</button>
        <button class="stamp-btn" data-stamp="question" title="Question">&#10067;</button>
        <button class="stamp-btn" data-stamp="exclaim" title="Exclamation">&#10071;</button>
      </div>
    </div>
  </div>

  <!-- Status bar -->
  <div id="statusbar">
    <span id="status-tool">Arrow Tool</span>
    <span id="status-pos">0, 0</span>
    <span id="status-size"></span>
  </div>
</div>

<script>
(function() {
  'use strict';

  /* ═══════════════════════════════════════════════════════════
     SECTION 1: STATE & CONSTANTS
     ═══════════════════════════════════════════════════════════ */

  const canvas = document.getElementById('editor-canvas');
  const ctx = canvas.getContext('2d');

  let img = null;
  let tool = 'arrow';
  let zoom = 1;
  let canvasNativeW = 0, canvasNativeH = 0;

  // All annotation objects in a single ordered array
  let layers = [];
  let cropRegion = null;

  // Interaction state
  let isDragging = false;
  let dragStart = null;
  let penPoints = [];
  let selectedIdx = -1;
  let dragOffset = { x: 0, y: 0 };

  // Step numbering
  let nextStepNumber = 1;

  // Stamp selection
  let currentStamp = 'checkmark';

  // Text editing state
  let pendingText = null;
  let editingTextIdx = -1;

  // Undo / Redo
  let undoStack = [];
  let redoStack = [];
  const MAX_UNDO = 50;

  // Stamp glyphs
  const STAMP_GLYPHS = {
    checkmark: '\u2714', cross: '\u2718', star: '\u2605', info: '\u2139',
    warning: '\u26A0', heart: '\u2764', thumbsup: '\uD83D\uDC4D', thumbsdown: '\uD83D\uDC4E',
    question: '\u2753', exclaim: '\u2763',
  };

  const HANDLE_SIZE = 6;

  /* ═══════════════════════════════════════════════════════════
     SECTION 2: PROPERTY GETTERS
     ═══════════════════════════════════════════════════════════ */

  function getColor() { return document.getElementById('prop-color').value; }
  function getFillColor() { return document.getElementById('prop-fill').value; }
  function getFillMode() { return document.getElementById('prop-fill-mode').value; }
  function getStrokeWidth() { return parseInt(document.getElementById('prop-stroke-width').value) || 3; }
  function getFontFamily() { return document.getElementById('prop-font-family').value; }
  function getFontSize() { return parseInt(document.getElementById('prop-font-size').value) || 18; }
  function isBold() { return document.getElementById('prop-bold').classList.contains('active'); }
  function getOpacity() { return parseInt(document.getElementById('prop-opacity').value) / 100; }
  function getBlurIntensity() { return parseInt(document.getElementById('prop-blur-intensity').value) || 16; }
  function getStepSize() { return parseInt(document.getElementById('prop-step-size').value) || 28; }
  function getArrowHead() { return document.getElementById('prop-arrow-head').value; }

  /* ═══════════════════════════════════════════════════════════
     SECTION 3: UNDO / REDO
     ═══════════════════════════════════════════════════════════ */

  function saveState() {
    undoStack.push({
      layers: JSON.parse(JSON.stringify(layers)),
      cropRegion: cropRegion ? { ...cropRegion } : null,
      nextStepNumber,
    });
    if (undoStack.length > MAX_UNDO) undoStack.shift();
    redoStack = [];
  }

  function undo() {
    if (undoStack.length === 0) return;
    redoStack.push({
      layers: JSON.parse(JSON.stringify(layers)),
      cropRegion: cropRegion ? { ...cropRegion } : null,
      nextStepNumber,
    });
    const state = undoStack.pop();
    layers = state.layers;
    cropRegion = state.cropRegion;
    nextStepNumber = state.nextStepNumber;
    selectedIdx = -1;
    updateStepPreview();
    redraw();
  }

  function redo() {
    if (redoStack.length === 0) return;
    undoStack.push({
      layers: JSON.parse(JSON.stringify(layers)),
      cropRegion: cropRegion ? { ...cropRegion } : null,
      nextStepNumber,
    });
    const state = redoStack.pop();
    layers = state.layers;
    cropRegion = state.cropRegion;
    nextStepNumber = state.nextStepNumber;
    selectedIdx = -1;
    updateStepPreview();
    redraw();
  }

  /* ═══════════════════════════════════════════════════════════
     SECTION 4: DRAWING FUNCTIONS
     ═══════════════════════════════════════════════════════════ */

  function drawArrow(c, x1, y1, x2, y2, color, width, headMode) {
    const headLen = Math.max(12, width * 4);
    const angle = Math.atan2(y2 - y1, x2 - x1);

    c.strokeStyle = color;
    c.fillStyle = color;
    c.lineWidth = width;
    c.lineCap = 'round';
    c.lineJoin = 'round';

    c.beginPath();
    c.moveTo(x1, y1);
    c.lineTo(x2, y2);
    c.stroke();

    if (headMode === 'end' || headMode === 'both') {
      c.beginPath();
      c.moveTo(x2, y2);
      c.lineTo(x2 - headLen * Math.cos(angle - Math.PI / 6), y2 - headLen * Math.sin(angle - Math.PI / 6));
      c.lineTo(x2 - headLen * Math.cos(angle + Math.PI / 6), y2 - headLen * Math.sin(angle + Math.PI / 6));
      c.closePath();
      c.fill();
    }

    if (headMode === 'both') {
      const revAngle = angle + Math.PI;
      c.beginPath();
      c.moveTo(x1, y1);
      c.lineTo(x1 - headLen * Math.cos(revAngle - Math.PI / 6), y1 - headLen * Math.sin(revAngle - Math.PI / 6));
      c.lineTo(x1 - headLen * Math.cos(revAngle + Math.PI / 6), y1 - headLen * Math.sin(revAngle + Math.PI / 6));
      c.closePath();
      c.fill();
    }
  }

  function drawStepCircle(c, x, y, radius, number, color) {
    c.beginPath();
    c.arc(x, y, radius, 0, Math.PI * 2);
    c.fillStyle = color;
    c.fill();
    c.lineWidth = Math.max(2, radius * 0.12);
    c.strokeStyle = '#ffffff';
    c.stroke();
    c.fillStyle = '#ffffff';
    c.font = 'bold ' + Math.round(radius * 1.15) + 'px "Segoe UI", Arial, sans-serif';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillText(String(number), x, y + 1);
  }

  function drawStamp(c, x, y, stampType, size, color) {
    const glyph = STAMP_GLYPHS[stampType] || '\u2714';
    c.font = size + 'px "Segoe UI Emoji", "Segoe UI Symbol", "Apple Color Emoji", sans-serif';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    c.fillStyle = color;
    c.fillText(glyph, x, y);
  }

  function drawCallout(c, layer) {
    const { x, y, x2, y2, text, color, fillColor, fontFamily, fontSize, bold } = layer;
    const padX = 10, padY = 6;
    const fontStr = (bold ? 'bold ' : '') + fontSize + 'px "' + fontFamily + '", sans-serif';
    c.font = fontStr;
    const lines = text.split('\n');
    const lineHeight = fontSize * 1.3;
    let maxW = 0;
    for (const ln of lines) { maxW = Math.max(maxW, c.measureText(ln).width); }
    const boxW = maxW + padX * 2;
    const boxH = lines.length * lineHeight + padY * 2;

    const bx = x2, by = y2;
    c.fillStyle = fillColor || '#fff8dc';
    c.strokeStyle = color;
    c.lineWidth = 2;
    roundRect(c, bx, by, boxW, boxH, 6);
    c.fill();
    c.stroke();

    const cx = bx + boxW / 2, cy = by + boxH / 2;
    c.beginPath();
    c.moveTo(x, y);
    c.lineTo(cx, cy);
    c.strokeStyle = color;
    c.lineWidth = 2;
    c.stroke();

    c.fillStyle = color;
    c.font = fontStr;
    c.textAlign = 'left';
    c.textBaseline = 'top';
    for (let i = 0; i < lines.length; i++) {
      c.fillText(lines[i], bx + padX, by + padY + i * lineHeight);
    }
  }

  function roundRect(c, x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x + r, y);
    c.lineTo(x + w - r, y);
    c.quadraticCurveTo(x + w, y, x + w, y + r);
    c.lineTo(x + w, y + h - r);
    c.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    c.lineTo(x + r, y + h);
    c.quadraticCurveTo(x, y + h, x, y + h - r);
    c.lineTo(x, y + r);
    c.quadraticCurveTo(x, y, x + r, y);
    c.closePath();
  }

  function applyPixelBlur(c, bx, by, bw, bh, intensity, cw, ch) {
    const x = Math.max(0, Math.round(bx));
    const y = Math.max(0, Math.round(by));
    const w = Math.min(Math.round(bw), cw - x);
    const h = Math.min(Math.round(bh), ch - y);
    if (w < 2 || h < 2) return;
    const blockSize = Math.max(2, Math.round(intensity));
    const imageData = c.getImageData(x, y, w, h);
    const data = imageData.data;
    for (let py = 0; py < h; py += blockSize) {
      for (let px = 0; px < w; px += blockSize) {
        let r = 0, g = 0, b = 0, a = 0, count = 0;
        const maxPy = Math.min(py + blockSize, h);
        const maxPx = Math.min(px + blockSize, w);
        for (let dy = py; dy < maxPy; dy++) {
          for (let dx = px; dx < maxPx; dx++) {
            const i = (dy * w + dx) * 4;
            r += data[i]; g += data[i + 1]; b += data[i + 2]; a += data[i + 3]; count++;
          }
        }
        r = Math.round(r / count); g = Math.round(g / count);
        b = Math.round(b / count); a = Math.round(a / count);
        for (let dy = py; dy < maxPy; dy++) {
          for (let dx = px; dx < maxPx; dx++) {
            const i = (dy * w + dx) * 4;
            data[i] = r; data[i + 1] = g; data[i + 2] = b; data[i + 3] = a;
          }
        }
      }
    }
    c.putImageData(imageData, x, y);
  }

  function drawPenPath(c, points, color, width) {
    if (points.length < 2) return;
    c.strokeStyle = color;
    c.lineWidth = width;
    c.lineCap = 'round';
    c.lineJoin = 'round';
    c.beginPath();
    c.moveTo(points[0].x, points[0].y);
    for (let i = 1; i < points.length; i++) {
      const prev = points[i - 1], curr = points[i];
      const midX = (prev.x + curr.x) / 2, midY = (prev.y + curr.y) / 2;
      c.quadraticCurveTo(prev.x, prev.y, midX, midY);
    }
    c.lineTo(points[points.length - 1].x, points[points.length - 1].y);
    c.stroke();
  }

  function drawText(c, layer) {
    const { x, y, text, color, fontFamily, fontSize, bold } = layer;
    const fontStr = (bold ? 'bold ' : '') + fontSize + 'px "' + fontFamily + '", sans-serif';
    c.font = fontStr;
    c.fillStyle = color;
    c.textAlign = 'left';
    c.textBaseline = 'top';
    const lines = text.split('\n');
    const lineHeight = fontSize * 1.3;
    for (let i = 0; i < lines.length; i++) {
      c.fillText(lines[i], x, y + i * lineHeight);
    }
  }

  function drawSelectionHandles(c, bounds) {
    const { x, y, w, h } = bounds;
    c.strokeStyle = '#58a6ff';
    c.lineWidth = 1.5;
    c.setLineDash([4, 3]);
    c.strokeRect(x - 4, y - 4, w + 8, h + 8);
    c.setLineDash([]);

    const corners = [
      { cx: x - 4, cy: y - 4 }, { cx: x + w - 2, cy: y - 4 },
      { cx: x - 4, cy: y + h - 2 }, { cx: x + w - 2, cy: y + h - 2 },
    ];
    c.fillStyle = '#58a6ff';
    for (const cr of corners) {
      c.fillRect(cr.cx, cr.cy, HANDLE_SIZE, HANDLE_SIZE);
    }
  }

  /* ═══════════════════════════════════════════════════════════
     SECTION 5: BOUNDING BOX FOR ANY LAYER
     ═══════════════════════════════════════════════════════════ */

  function getLayerBounds(layer) {
    switch (layer.type) {
      case 'arrow':
      case 'line': {
        const x = Math.min(layer.x1, layer.x2), y = Math.min(layer.y1, layer.y2);
        return { x, y, w: Math.abs(layer.x2 - layer.x1) || 1, h: Math.abs(layer.y2 - layer.y1) || 1 };
      }
      case 'rect':
      case 'highlight':
      case 'blur':
        return { x: layer.x, y: layer.y, w: layer.w, h: layer.h };
      case 'ellipse':
        return { x: layer.cx - layer.rx, y: layer.cy - layer.ry, w: layer.rx * 2, h: layer.ry * 2 };
      case 'step':
        return { x: layer.x - layer.radius, y: layer.y - layer.radius, w: layer.radius * 2, h: layer.radius * 2 };
      case 'stamp':
        return { x: layer.x - layer.size / 2, y: layer.y - layer.size / 2, w: layer.size, h: layer.size };
      case 'text':
      case 'callout': {
        const tx = layer.type === 'callout' ? layer.x2 : layer.x;
        const ty = layer.type === 'callout' ? layer.y2 : layer.y;
        ctx.font = (layer.bold ? 'bold ' : '') + layer.fontSize + 'px "' + layer.fontFamily + '", sans-serif';
        const lines = layer.text.split('\n');
        let maxW = 0;
        for (const ln of lines) maxW = Math.max(maxW, ctx.measureText(ln).width);
        const h = lines.length * layer.fontSize * 1.3;
        return { x: tx, y: ty, w: maxW + 20, h: h + 12 };
      }
      case 'pen': {
        let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
        for (const p of layer.points) {
          if (p.x < minX) minX = p.x; if (p.y < minY) minY = p.y;
          if (p.x > maxX) maxX = p.x; if (p.y > maxY) maxY = p.y;
        }
        return { x: minX, y: minY, w: (maxX - minX) || 1, h: (maxY - minY) || 1 };
      }
      default:
        return { x: 0, y: 0, w: 0, h: 0 };
    }
  }

  /* ═══════════════════════════════════════════════════════════
     SECTION 6: HIT TESTING
     ═══════════════════════════════════════════════════════════ */

  function hitTestLayer(layer, mx, my) {
    const TOLERANCE = 8;
    switch (layer.type) {
      case 'arrow':
      case 'line':
        return distToSegment(mx, my, layer.x1, layer.y1, layer.x2, layer.y2) < TOLERANCE + layer.strokeWidth;
      case 'rect': {
        const { x, y, w, h } = layer;
        return mx >= x - TOLERANCE && mx <= x + w + TOLERANCE && my >= y - TOLERANCE && my <= y + h + TOLERANCE;
      }
      case 'highlight':
      case 'blur': {
        const { x, y, w, h } = layer;
        return mx >= x && mx <= x + w && my >= y && my <= y + h;
      }
      case 'ellipse': {
        const dx = (mx - layer.cx) / (layer.rx + TOLERANCE);
        const dy = (my - layer.cy) / (layer.ry + TOLERANCE);
        return dx * dx + dy * dy <= 1;
      }
      case 'step': {
        const dx = mx - layer.x, dy = my - layer.y;
        return dx * dx + dy * dy <= (layer.radius + TOLERANCE) * (layer.radius + TOLERANCE);
      }
      case 'stamp': {
        const half = layer.size / 2 + TOLERANCE;
        return Math.abs(mx - layer.x) <= half && Math.abs(my - layer.y) <= half;
      }
      case 'text':
      case 'callout': {
        const bounds = getLayerBounds(layer);
        return mx >= bounds.x - TOLERANCE && mx <= bounds.x + bounds.w + TOLERANCE &&
               my >= bounds.y - TOLERANCE && my <= bounds.y + bounds.h + TOLERANCE;
      }
      case 'pen': {
        for (let i = 1; i < layer.points.length; i++) {
          if (distToSegment(mx, my, layer.points[i - 1].x, layer.points[i - 1].y, layer.points[i].x, layer.points[i].y) < TOLERANCE + layer.strokeWidth) return true;
        }
        return false;
      }
    }
    return false;
  }

  function distToSegment(px, py, x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    const lenSq = dx * dx + dy * dy;
    if (lenSq === 0) return Math.hypot(px - x1, py - y1);
    let t = ((px - x1) * dx + (py - y1) * dy) / lenSq;
    t = Math.max(0, Math.min(1, t));
    return Math.hypot(px - (x1 + t * dx), py - (y1 + t * dy));
  }

  function hitTestAll(mx, my) {
    for (let i = layers.length - 1; i >= 0; i--) {
      if (hitTestLayer(layers[i], mx, my)) return i;
    }
    return -1;
  }

  /* ═══════════════════════════════════════════════════════════
     SECTION 7: MAIN REDRAW
     ═══════════════════════════════════════════════════════════ */

  function redraw() {
    if (!img) return;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

    for (let i = 0; i < layers.length; i++) {
      const L = layers[i];
      switch (L.type) {
        case 'arrow':
          drawArrow(ctx, L.x1, L.y1, L.x2, L.y2, L.color, L.strokeWidth, L.headMode);
          break;
        case 'line':
          ctx.strokeStyle = L.color; ctx.lineWidth = L.strokeWidth; ctx.lineCap = 'round';
          ctx.beginPath(); ctx.moveTo(L.x1, L.y1); ctx.lineTo(L.x2, L.y2); ctx.stroke();
          break;
        case 'rect':
          applyFill(ctx, L);
          ctx.strokeStyle = L.color; ctx.lineWidth = L.strokeWidth; ctx.lineJoin = 'round';
          ctx.strokeRect(L.x, L.y, L.w, L.h);
          break;
        case 'ellipse':
          ctx.beginPath();
          ctx.ellipse(L.cx, L.cy, Math.abs(L.rx), Math.abs(L.ry), 0, 0, Math.PI * 2);
          applyFill(ctx, L);
          ctx.strokeStyle = L.color; ctx.lineWidth = L.strokeWidth;
          ctx.stroke();
          break;
        case 'highlight':
          ctx.fillStyle = hexToRgba(L.color, L.opacity);
          ctx.fillRect(L.x, L.y, L.w, L.h);
          break;
        case 'blur':
          applyPixelBlur(ctx, L.x, L.y, L.w, L.h, L.intensity, canvas.width, canvas.height);
          break;
        case 'pen':
          drawPenPath(ctx, L.points, L.color, L.strokeWidth);
          break;
        case 'text':
          drawText(ctx, L);
          break;
        case 'callout':
          drawCallout(ctx, L);
          break;
        case 'step':
          drawStepCircle(ctx, L.x, L.y, L.radius, L.number, L.color);
          break;
        case 'stamp':
          drawStamp(ctx, L.x, L.y, L.stampType, L.size, L.color);
          break;
      }

      // Selection highlight
      if (i === selectedIdx && tool === 'select') {
        drawSelectionHandles(ctx, getLayerBounds(L));
      }
    }

    // Crop overlay
    if (cropRegion && tool === 'crop') {
      ctx.fillStyle = 'rgba(0,0,0,.55)';
      ctx.fillRect(0, 0, canvas.width, cropRegion.y);
      ctx.fillRect(0, cropRegion.y + cropRegion.h, canvas.width, canvas.height - cropRegion.y - cropRegion.h);
      ctx.fillRect(0, cropRegion.y, cropRegion.x, cropRegion.h);
      ctx.fillRect(cropRegion.x + cropRegion.w, cropRegion.y, canvas.width - cropRegion.x - cropRegion.w, cropRegion.h);
      ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.setLineDash([6, 4]);
      ctx.strokeRect(cropRegion.x, cropRegion.y, cropRegion.w, cropRegion.h);
      ctx.setLineDash([]);
      // Rule of thirds
      ctx.strokeStyle = 'rgba(255,255,255,.3)'; ctx.lineWidth = 1;
      for (let j = 1; j <= 2; j++) {
        ctx.beginPath();
        ctx.moveTo(cropRegion.x + cropRegion.w * j / 3, cropRegion.y);
        ctx.lineTo(cropRegion.x + cropRegion.w * j / 3, cropRegion.y + cropRegion.h);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(cropRegion.x, cropRegion.y + cropRegion.h * j / 3);
        ctx.lineTo(cropRegion.x + cropRegion.w, cropRegion.y + cropRegion.h * j / 3);
        ctx.stroke();
      }
    }
  }

  function applyFill(c, L) {
    if (L.fillMode === 'solid') {
      c.fillStyle = L.fillColor;
      if (L.type === 'rect') c.fillRect(L.x, L.y, L.w, L.h);
      else c.fill();
    } else if (L.fillMode === 'semi') {
      c.fillStyle = hexToRgba(L.fillColor, 0.5);
      if (L.type === 'rect') c.fillRect(L.x, L.y, L.w, L.h);
      else c.fill();
    }
  }

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1, 3), 16);
    const g = parseInt(hex.slice(3, 5), 16);
    const b = parseInt(hex.slice(5, 7), 16);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  /* ═══════════════════════════════════════════════════════════
     SECTION 8: ZOOM / CANVAS SIZING
     ═══════════════════════════════════════════════════════════ */

  function fitCanvas() {
    if (!img) return;
    const area = document.getElementById('canvas-area');
    const maxW = area.clientWidth - 32, maxH = area.clientHeight - 32;
    let w = img.width, h = img.height;
    const scaleToFit = Math.min(maxW / w, maxH / h, 1);
    canvasNativeW = Math.round(w * scaleToFit);
    canvasNativeH = Math.round(h * scaleToFit);
    applyZoom();
  }

  function applyZoom() {
    canvas.width = Math.round(canvasNativeW * zoom);
    canvas.height = Math.round(canvasNativeH * zoom);
    document.getElementById('zoom-level').textContent = Math.round(zoom * 100) + '%';
    redraw();
  }

  document.getElementById('zoom-in').addEventListener('click', () => { zoom = Math.min(zoom + 0.25, 4); applyZoom(); });
  document.getElementById('zoom-out').addEventListener('click', () => { zoom = Math.max(zoom - 0.25, 0.25); applyZoom(); });
  document.getElementById('zoom-fit').addEventListener('click', () => { zoom = 1; applyZoom(); });

  /* ═══════════════════════════════════════════════════════════
     SECTION 9: TOOL SWITCHING & UI
     ═══════════════════════════════════════════════════════════ */

  const TOOL_NAMES = {
    select: 'Select / Move', arrow: 'Arrow', line: 'Line', rect: 'Rectangle', ellipse: 'Ellipse',
    pen: 'Pen', text: 'Text', callout: 'Callout', highlight: 'Highlight', blur: 'Blur',
    step: 'Step Number', stamp: 'Stamp', crop: 'Crop', eraser: 'Eraser', eyedropper: 'Eyedropper',
  };

  const TOOL_CURSORS = {
    select: 'default', arrow: 'crosshair', line: 'crosshair', rect: 'crosshair', ellipse: 'crosshair',
    pen: 'crosshair', text: 'text', callout: 'crosshair', highlight: 'crosshair', blur: 'crosshair',
    step: 'copy', stamp: 'copy', crop: 'crosshair', eraser: 'not-allowed', eyedropper: 'crosshair',
  };

  function setTool(t) {
    tool = t;
    selectedIdx = -1;
    hideTextOverlay();
    if (t !== 'stamp') hideStampPicker();

    // Update sidebar buttons
    document.querySelectorAll('#sidebar button').forEach(b => b.classList.remove('active'));
    const btn = document.getElementById('tool-' + t);
    if (btn) btn.classList.add('active');

    // Show/hide relevant prop groups
    document.getElementById('grp-fill').style.display = ['rect', 'ellipse'].includes(t) ? 'flex' : 'none';
    document.getElementById('grp-font').style.display = ['text', 'callout'].includes(t) ? 'flex' : 'none';
    document.getElementById('grp-opacity').style.display = t === 'highlight' ? 'flex' : 'none';
    document.getElementById('grp-blur-intensity').style.display = t === 'blur' ? 'flex' : 'none';
    document.getElementById('grp-step').style.display = t === 'step' ? 'flex' : 'none';
    document.getElementById('grp-arrow-head').style.display = t === 'arrow' ? 'flex' : 'none';

    canvas.style.cursor = TOOL_CURSORS[t] || 'crosshair';
    document.getElementById('status-tool').textContent = (TOOL_NAMES[t] || t) + ' Tool';

    if (t === 'stamp') showStampPicker();

    redraw();
  }

  // Sidebar click handlers
  const toolIds = ['select', 'arrow', 'line', 'rect', 'ellipse', 'pen', 'text', 'callout',
                   'highlight', 'blur', 'step', 'stamp', 'crop', 'eraser', 'eyedropper'];
  toolIds.forEach(t => {
    const btn = document.getElementById('tool-' + t);
    if (btn) btn.addEventListener('click', () => setTool(t));
  });

  // Bold toggle
  document.getElementById('prop-bold').addEventListener('click', function() { this.classList.toggle('active'); });

  // Opacity label
  document.getElementById('prop-opacity').addEventListener('input', (e) => {
    document.getElementById('opacity-val').textContent = e.target.value + '%';
  });

  // Blur label
  document.getElementById('prop-blur-intensity').addEventListener('input', (e) => {
    document.getElementById('blur-val').textContent = e.target.value;
  });

  function updateStepPreview() {
    document.getElementById('next-step-preview').textContent = nextStepNumber;
  }

  /* ═══════════════════════════════════════════════════════════
     SECTION 10: STAMP PICKER
     ═══════════════════════════════════════════════════════════ */

  function showStampPicker() {
    const picker = document.getElementById('stamp-picker');
    const btn = document.getElementById('tool-stamp');
    const rect = btn.getBoundingClientRect();
    picker.style.left = (rect.right + 8) + 'px';
    picker.style.top = rect.top + 'px';
    picker.style.display = 'block';
  }
  function hideStampPicker() { document.getElementById('stamp-picker').style.display = 'none'; }

  document.querySelectorAll('.stamp-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.stamp-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      currentStamp = btn.dataset.stamp;
    });
  });

  /* ═══════════════════════════════════════════════════════════
     SECTION 11: TEXT INPUT OVERLAY
     ═══════════════════════════════════════════════════════════ */

  function showTextOverlay(cx, cy, existingText) {
    const overlay = document.getElementById('text-input-overlay');
    const area = document.getElementById('text-area');
    const canvasRect = canvas.getBoundingClientRect();
    const areaRect = document.getElementById('canvas-area').getBoundingClientRect();

    overlay.style.left = (canvasRect.left - areaRect.left + cx) + 'px';
    overlay.style.top = (canvasRect.top - areaRect.top + cy) + 'px';
    overlay.style.display = 'block';

    area.value = existingText || '';
    area.style.fontSize = getFontSize() + 'px';
    area.style.fontFamily = getFontFamily();
    area.style.fontWeight = isBold() ? '700' : '400';
    area.style.color = getColor();
    area.focus();
  }

  function hideTextOverlay() {
    document.getElementById('text-input-overlay').style.display = 'none';
    pendingText = null;
    editingTextIdx = -1;
  }

  document.getElementById('text-confirm').addEventListener('click', commitText);
  document.getElementById('text-discard').addEventListener('click', hideTextOverlay);

  function commitText() {
    const text = document.getElementById('text-area').value.trim();
    if (!text) { hideTextOverlay(); return; }

    saveState();

    if (editingTextIdx >= 0 && layers[editingTextIdx]) {
      layers[editingTextIdx].text = text;
      layers[editingTextIdx].color = getColor();
      layers[editingTextIdx].fontFamily = getFontFamily();
      layers[editingTextIdx].fontSize = getFontSize();
      layers[editingTextIdx].bold = isBold();
    } else if (pendingText) {
      if (tool === 'callout') {
        layers.push({
          type: 'callout', x: pendingText.x, y: pendingText.y,
          x2: pendingText.x + 20, y2: pendingText.y - 60,
          text, color: getColor(), fillColor: '#fff8dc',
          fontFamily: getFontFamily(), fontSize: getFontSize(), bold: isBold(),
        });
      } else {
        layers.push({
          type: 'text', x: pendingText.x, y: pendingText.y,
          text, color: getColor(),
          fontFamily: getFontFamily(), fontSize: getFontSize(), bold: isBold(),
        });
      }
    }

    hideTextOverlay();
    redraw();
  }

  /* ═══════════════════════════════════════════════════════════
     SECTION 12: CANVAS MOUSE EVENTS
     ═══════════════════════════════════════════════════════════ */

  function getCanvasPos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }

  canvas.addEventListener('mousedown', (e) => {
    if (e.button === 2) return;
    const { x: mx, y: my } = getCanvasPos(e);

    // ── Eyedropper ──
    if (tool === 'eyedropper') {
      const pixel = ctx.getImageData(Math.round(mx), Math.round(my), 1, 1).data;
      const hex = '#' + [pixel[0], pixel[1], pixel[2]].map(v => v.toString(16).padStart(2, '0')).join('');
      document.getElementById('prop-color').value = hex;
      setTool('arrow');
      return;
    }

    // ── Select tool ──
    if (tool === 'select') {
      const idx = hitTestAll(mx, my);
      if (idx !== selectedIdx) {
        selectedIdx = idx;
        redraw();
      }
      if (idx >= 0) {
        isDragging = true;
        const bounds = getLayerBounds(layers[idx]);
        dragOffset = { x: mx - bounds.x, y: my - bounds.y };
        canvas.style.cursor = 'grabbing';
      }
      return;
    }

    // ── Eraser ──
    if (tool === 'eraser') {
      const idx = hitTestAll(mx, my);
      if (idx >= 0) {
        saveState();
        const removed = layers[idx];
        layers.splice(idx, 1);
        if (removed.type === 'step') renumberSteps();
        redraw();
      }
      return;
    }

    // ── Text / Callout ──
    if (tool === 'text' || tool === 'callout') {
      // Check if clicking existing text to re-edit
      const idx = hitTestAll(mx, my);
      if (idx >= 0 && (layers[idx].type === 'text' || layers[idx].type === 'callout')) {
        editingTextIdx = idx;
        const L = layers[idx];
        const tx = L.type === 'callout' ? L.x2 : L.x;
        const ty = L.type === 'callout' ? L.y2 : L.y;
        showTextOverlay(tx, ty, L.text);
        return;
      }
      pendingText = { x: mx, y: my };
      showTextOverlay(mx, my, '');
      return;
    }

    // ── Step ──
    if (tool === 'step') {
      const idx = hitStepLayers(mx, my);
      if (idx >= 0) {
        selectedIdx = idx;
        isDragging = true;
        dragOffset = { x: mx - layers[idx].x, y: my - layers[idx].y };
        canvas.style.cursor = 'grabbing';
        redraw();
        return;
      }
      saveState();
      layers.push({
        type: 'step', x: mx, y: my, radius: getStepSize(),
        number: nextStepNumber, color: getColor(),
      });
      nextStepNumber++;
      updateStepPreview();
      redraw();
      return;
    }

    // ── Stamp ──
    if (tool === 'stamp') {
      saveState();
      layers.push({
        type: 'stamp', x: mx, y: my, stampType: currentStamp,
        size: getStepSize(), color: getColor(),
      });
      redraw();
      return;
    }

    // ── Drag-based tools ──
    dragStart = { x: mx, y: my };
    isDragging = true;

    if (tool === 'pen') {
      penPoints = [{ x: mx, y: my }];
    }
  });

  canvas.addEventListener('mousemove', (e) => {
    const { x: mx, y: my } = getCanvasPos(e);
    document.getElementById('status-pos').textContent = Math.round(mx) + ', ' + Math.round(my);

    // Move selected layer
    if (tool === 'select' && isDragging && selectedIdx >= 0) {
      moveLayer(selectedIdx, mx - dragOffset.x, my - dragOffset.y);
      redraw();
      return;
    }

    // Move step
    if (tool === 'step' && isDragging && selectedIdx >= 0) {
      layers[selectedIdx].x = mx - dragOffset.x;
      layers[selectedIdx].y = my - dragOffset.y;
      redraw();
      return;
    }

    // Hover cursor for select
    if (tool === 'select' && !isDragging) {
      canvas.style.cursor = hitTestAll(mx, my) >= 0 ? 'grab' : 'default';
    }

    if (!isDragging || !dragStart) return;

    const rx = Math.min(dragStart.x, mx), ry = Math.min(dragStart.y, my);
    const rw = Math.abs(mx - dragStart.x), rh = Math.abs(my - dragStart.y);

    // Live preview
    redraw();

    if (tool === 'arrow') {
      drawArrow(ctx, dragStart.x, dragStart.y, mx, my, getColor(), getStrokeWidth(), getArrowHead());
    } else if (tool === 'line') {
      ctx.strokeStyle = getColor(); ctx.lineWidth = getStrokeWidth(); ctx.lineCap = 'round';
      ctx.beginPath(); ctx.moveTo(dragStart.x, dragStart.y); ctx.lineTo(mx, my); ctx.stroke();
    } else if (tool === 'rect') {
      if (getFillMode() !== 'none') {
        ctx.fillStyle = getFillMode() === 'semi' ? hexToRgba(getFillColor(), 0.5) : getFillColor();
        ctx.fillRect(rx, ry, rw, rh);
      }
      ctx.strokeStyle = getColor(); ctx.lineWidth = getStrokeWidth(); ctx.lineJoin = 'round';
      ctx.strokeRect(rx, ry, rw, rh);
    } else if (tool === 'ellipse') {
      const ecx = (dragStart.x + mx) / 2, ecy = (dragStart.y + my) / 2;
      const erx = rw / 2, ery = rh / 2;
      ctx.beginPath(); ctx.ellipse(ecx, ecy, Math.max(1, erx), Math.max(1, ery), 0, 0, Math.PI * 2);
      if (getFillMode() !== 'none') {
        ctx.fillStyle = getFillMode() === 'semi' ? hexToRgba(getFillColor(), 0.5) : getFillColor();
        ctx.fill();
      }
      ctx.strokeStyle = getColor(); ctx.lineWidth = getStrokeWidth(); ctx.stroke();
    } else if (tool === 'highlight') {
      ctx.fillStyle = hexToRgba(getColor(), getOpacity());
      ctx.fillRect(rx, ry, rw, rh);
    } else if (tool === 'blur') {
      if (rw > 2 && rh > 2) applyPixelBlur(ctx, rx, ry, rw, rh, getBlurIntensity(), canvas.width, canvas.height);
      ctx.strokeStyle = '#e05d44'; ctx.lineWidth = 2; ctx.setLineDash([4, 4]);
      ctx.strokeRect(rx, ry, rw, rh); ctx.setLineDash([]);
    } else if (tool === 'pen') {
      penPoints.push({ x: mx, y: my });
      drawPenPath(ctx, penPoints, getColor(), getStrokeWidth());
    } else if (tool === 'crop') {
      cropRegion = { x: rx, y: ry, w: rw, h: rh };
      redraw();
    }

    document.getElementById('status-size').textContent = Math.round(rw) + ' \u00D7 ' + Math.round(rh);
  });

  canvas.addEventListener('mouseup', (e) => {
    // Finish select move
    if (tool === 'select' && isDragging && selectedIdx >= 0) {
      saveState();
      isDragging = false;
      canvas.style.cursor = 'grab';
      return;
    }

    // Finish step move
    if (tool === 'step' && isDragging && selectedIdx >= 0) {
      saveState();
      isDragging = false;
      selectedIdx = -1;
      canvas.style.cursor = 'copy';
      return;
    }

    if (!isDragging || !dragStart) { isDragging = false; return; }

    const { x: mx, y: my } = getCanvasPos(e);
    const rx = Math.min(dragStart.x, mx), ry = Math.min(dragStart.y, my);
    const rw = Math.abs(mx - dragStart.x), rh = Math.abs(my - dragStart.y);

    const minSize = tool === 'pen' ? 3 : 5;
    const size = tool === 'arrow' || tool === 'line'
      ? Math.hypot(mx - dragStart.x, my - dragStart.y)
      : Math.max(rw, rh);

    if (size > minSize) {
      saveState();

      if (tool === 'arrow') {
        layers.push({
          type: 'arrow', x1: dragStart.x, y1: dragStart.y, x2: mx, y2: my,
          color: getColor(), strokeWidth: getStrokeWidth(), headMode: getArrowHead(),
        });
      } else if (tool === 'line') {
        layers.push({
          type: 'line', x1: dragStart.x, y1: dragStart.y, x2: mx, y2: my,
          color: getColor(), strokeWidth: getStrokeWidth(),
        });
      } else if (tool === 'rect') {
        layers.push({
          type: 'rect', x: rx, y: ry, w: rw, h: rh,
          color: getColor(), strokeWidth: getStrokeWidth(),
          fillMode: getFillMode(), fillColor: getFillColor(),
        });
      } else if (tool === 'ellipse') {
        layers.push({
          type: 'ellipse', cx: (dragStart.x + mx) / 2, cy: (dragStart.y + my) / 2,
          rx: rw / 2, ry: rh / 2,
          color: getColor(), strokeWidth: getStrokeWidth(),
          fillMode: getFillMode(), fillColor: getFillColor(),
        });
      } else if (tool === 'highlight') {
        layers.push({
          type: 'highlight', x: rx, y: ry, w: rw, h: rh,
          color: getColor(), opacity: getOpacity(),
        });
      } else if (tool === 'blur') {
        layers.push({
          type: 'blur', x: rx, y: ry, w: rw, h: rh,
          intensity: getBlurIntensity(),
        });
      } else if (tool === 'pen' && penPoints.length > 1) {
        layers.push({
          type: 'pen', points: [...penPoints],
          color: getColor(), strokeWidth: getStrokeWidth(),
        });
        penPoints = [];
      } else if (tool === 'crop') {
        cropRegion = { x: rx, y: ry, w: rw, h: rh };
      }
    }

    isDragging = false;
    dragStart = null;
    redraw();
  });

  // Context menu — right-click to delete annotation
  canvas.addEventListener('contextmenu', (e) => {
    e.preventDefault();
    const { x: mx, y: my } = getCanvasPos(e);
    const idx = hitTestAll(mx, my);
    if (idx >= 0) {
      saveState();
      const removed = layers[idx];
      layers.splice(idx, 1);
      if (removed.type === 'step') renumberSteps();
      selectedIdx = -1;
      redraw();
    }
  });

  // Ctrl+Wheel zoom
  canvas.addEventListener('wheel', (e) => {
    if (e.ctrlKey) {
      e.preventDefault();
      const delta = e.deltaY < 0 ? 0.1 : -0.1;
      zoom = Math.max(0.25, Math.min(4, zoom + delta));
      applyZoom();
      return;
    }
    // Step resize on wheel
    if (tool === 'step') {
      const { x: mx, y: my } = getCanvasPos(e);
      const idx = hitStepLayers(mx, my);
      if (idx >= 0) {
        e.preventDefault();
        const delta = e.deltaY < 0 ? 3 : -3;
        layers[idx].radius = Math.max(10, Math.min(100, layers[idx].radius + delta));
        redraw();
      }
    }
  }, { passive: false });

  /* ═══════════════════════════════════════════════════════════
     SECTION 13: LAYER MOVE HELPER
     ═══════════════════════════════════════════════════════════ */

  function moveLayer(idx, newX, newY) {
    const L = layers[idx];
    const bounds = getLayerBounds(L);
    const dx = newX - bounds.x, dy = newY - bounds.y;

    switch (L.type) {
      case 'arrow': case 'line':
        L.x1 += dx; L.y1 += dy; L.x2 += dx; L.y2 += dy; break;
      case 'rect': case 'highlight': case 'blur':
        L.x += dx; L.y += dy; break;
      case 'ellipse':
        L.cx += dx; L.cy += dy; break;
      case 'step': case 'stamp':
        L.x += dx; L.y += dy; break;
      case 'text':
        L.x += dx; L.y += dy; break;
      case 'callout':
        L.x += dx; L.y += dy; L.x2 += dx; L.y2 += dy; break;
      case 'pen':
        for (const p of L.points) { p.x += dx; p.y += dy; } break;
    }
  }

  function hitStepLayers(mx, my) {
    for (let i = layers.length - 1; i >= 0; i--) {
      if (layers[i].type === 'step' && hitTestLayer(layers[i], mx, my)) return i;
    }
    return -1;
  }

  function renumberSteps() {
    let num = 1;
    for (const L of layers) {
      if (L.type === 'step') { L.number = num++; }
    }
    nextStepNumber = num;
    updateStepPreview();
  }

  /* ═══════════════════════════════════════════════════════════
     SECTION 14: BUTTONS
     ═══════════════════════════════════════════════════════════ */

  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-redo').addEventListener('click', redo);
  document.getElementById('btn-cancel').addEventListener('click', () => window.close());

  /* ═══════════════════════════════════════════════════════════
     SECTION 15: SAVE (EXPORT AT FULL RESOLUTION)
     ═══════════════════════════════════════════════════════════ */

  document.getElementById('btn-save').addEventListener('click', () => {
    if (!img) return;

    const full = document.createElement('canvas');
    const scX = img.width / canvas.width, scY = img.height / canvas.height;

    let sx = 0, sy = 0, sw = img.width, sh = img.height;
    if (cropRegion) {
      sx = Math.round(cropRegion.x * scX); sy = Math.round(cropRegion.y * scY);
      sw = Math.round(cropRegion.w * scX); sh = Math.round(cropRegion.h * scY);
    }
    full.width = sw; full.height = sh;
    const fc = full.getContext('2d');
    fc.drawImage(img, sx, sy, sw, sh, 0, 0, sw, sh);

    // Render all layers at full resolution
    for (const L of layers) {
      const sc = Math.max(scX, scY);
      switch (L.type) {
        case 'arrow':
          drawArrow(fc, L.x1 * scX - sx, L.y1 * scY - sy, L.x2 * scX - sx, L.y2 * scY - sy,
            L.color, L.strokeWidth * sc, L.headMode);
          break;
        case 'line':
          fc.strokeStyle = L.color; fc.lineWidth = L.strokeWidth * sc; fc.lineCap = 'round';
          fc.beginPath(); fc.moveTo(L.x1 * scX - sx, L.y1 * scY - sy);
          fc.lineTo(L.x2 * scX - sx, L.y2 * scY - sy); fc.stroke();
          break;
        case 'rect': {
          const fx = L.x * scX - sx, fy = L.y * scY - sy, fw = L.w * scX, fh = L.h * scY;
          if (L.fillMode === 'solid') { fc.fillStyle = L.fillColor; fc.fillRect(fx, fy, fw, fh); }
          else if (L.fillMode === 'semi') { fc.fillStyle = hexToRgba(L.fillColor, 0.5); fc.fillRect(fx, fy, fw, fh); }
          fc.strokeStyle = L.color; fc.lineWidth = L.strokeWidth * sc; fc.lineJoin = 'round';
          fc.strokeRect(fx, fy, fw, fh);
          break;
        }
        case 'ellipse': {
          const fcx = L.cx * scX - sx, fcy = L.cy * scY - sy;
          const frx = Math.abs(L.rx * scX), fry = Math.abs(L.ry * scY);
          fc.beginPath(); fc.ellipse(fcx, fcy, frx, fry, 0, 0, Math.PI * 2);
          if (L.fillMode === 'solid') { fc.fillStyle = L.fillColor; fc.fill(); }
          else if (L.fillMode === 'semi') { fc.fillStyle = hexToRgba(L.fillColor, 0.5); fc.fill(); }
          fc.strokeStyle = L.color; fc.lineWidth = L.strokeWidth * sc; fc.stroke();
          break;
        }
        case 'highlight': {
          fc.fillStyle = hexToRgba(L.color, L.opacity);
          fc.fillRect(L.x * scX - sx, L.y * scY - sy, L.w * scX, L.h * scY);
          break;
        }
        case 'blur': {
          applyPixelBlur(fc, L.x * scX - sx, L.y * scY - sy, L.w * scX, L.h * scY,
            L.intensity * sc, sw, sh);
          break;
        }
        case 'pen': {
          const pts = L.points.map(p => ({ x: p.x * scX - sx, y: p.y * scY - sy }));
          drawPenPath(fc, pts, L.color, L.strokeWidth * sc);
          break;
        }
        case 'text': {
          const fs = L.fontSize * sc;
          fc.font = (L.bold ? 'bold ' : '') + fs + 'px "' + L.fontFamily + '", sans-serif';
          fc.fillStyle = L.color; fc.textAlign = 'left'; fc.textBaseline = 'top';
          const lines = L.text.split('\n');
          const lh = fs * 1.3;
          for (let i = 0; i < lines.length; i++) {
            fc.fillText(lines[i], L.x * scX - sx, L.y * scY - sy + i * lh);
          }
          break;
        }
        case 'callout': {
          const scaled = {
            ...L,
            x: L.x * scX - sx, y: L.y * scY - sy,
            x2: L.x2 * scX - sx, y2: L.y2 * scY - sy,
            fontSize: L.fontSize * sc,
          };
          drawCallout(fc, scaled);
          break;
        }
        case 'step': {
          drawStepCircle(fc, L.x * scX - sx, L.y * scY - sy, L.radius * sc, L.number, L.color);
          break;
        }
        case 'stamp': {
          drawStamp(fc, L.x * scX - sx, L.y * scY - sy, L.stampType, L.size * sc, L.color);
          break;
        }
      }
    }

    const b64 = full.toDataURL('image/png').split(',')[1];
    window.editorAPI.save(b64);
  });

  /* ═══════════════════════════════════════════════════════════
     SECTION 16: KEYBOARD SHORTCUTS
     ═══════════════════════════════════════════════════════════ */

  document.addEventListener('keydown', (e) => {
    // Don't capture when typing in text area
    if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') {
      if (e.key === 'Escape') hideTextOverlay();
      if (e.key === 'Enter' && e.ctrlKey) { e.preventDefault(); commitText(); }
      return;
    }

    if (e.key === 'Escape') {
      if (selectedIdx >= 0) { selectedIdx = -1; redraw(); return; }
      window.close();
    }
    if (e.ctrlKey && e.key === 'z') { e.preventDefault(); undo(); }
    if (e.ctrlKey && e.key === 'y') { e.preventDefault(); redo(); }
    if (e.ctrlKey && e.shiftKey && e.key === 'Z') { e.preventDefault(); redo(); }
    if (e.ctrlKey && e.key === 's') { e.preventDefault(); document.getElementById('btn-save').click(); }

    // Tool shortcuts (single key, no modifiers)
    if (!e.ctrlKey && !e.altKey && !e.metaKey) {
      const shortcuts = { v: 'select', a: 'arrow', l: 'line', r: 'rect', e: 'ellipse', p: 'pen',
        t: 'text', c: 'callout', h: 'highlight', b: 'blur', n: 'step', s: 'stamp',
        x: 'crop', d: 'eraser', i: 'eyedropper' };
      const t = shortcuts[e.key.toLowerCase()];
      if (t) setTool(t);
    }

    // Delete selected annotation
    if ((e.key === 'Delete' || e.key === 'Backspace') && selectedIdx >= 0 && tool === 'select') {
      saveState();
      const removed = layers[selectedIdx];
      layers.splice(selectedIdx, 1);
      if (removed.type === 'step') renumberSteps();
      selectedIdx = -1;
      redraw();
    }
  });

  /* ═══════════════════════════════════════════════════════════
     SECTION 17: RECEIVE IMAGE FROM MAIN PROCESS
     ═══════════════════════════════════════════════════════════ */

  window.editorAPI.onImageData((data) => {
    document.title = 'Spektra Editor \u2014 Step ' + data.stepNumber;
    const image = new Image();
    image.onload = () => {
      img = image;
      zoom = 1;
      fitCanvas();
      updateStepPreview();
    };
    image.src = 'data:image/png;base64,' + data.base64;
  });

  // Initial tool setup
  setTool('arrow');

})();
</script>
</body>
</html>
