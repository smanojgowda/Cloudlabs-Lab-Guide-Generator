<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab Guide Recorder</title>
  <style>
    :root {
      --bg: #0a0e17;
      --bg-card: #111827;
      --border: #1e293b;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #22d3ee;
      --red: #ef4444;
      --green: #22c55e;
      --orange: #f59e0b;
      --font: 'Segoe UI', system-ui, sans-serif;
      --mono: 'Cascadia Code', 'Fira Code', monospace;
      --radius: 8px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      background: linear-gradient(135deg, #0f172a, #1e1b4b);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rec-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse 1.5s infinite;
    }

    .rec-dot.done {
      background: var(--green);
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-title {
      font-size: 14px;
      font-weight: 700;
      background: linear-gradient(90deg, var(--accent), #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .step-badge {
      background: rgba(34, 211, 238, 0.2);
      color: var(--accent);
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 600;
    }

    /* ── Content ── */
    .content {
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ── Capture Section ── */
    .capture-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
    }

    .capture-section textarea {
      width: 100%;
      height: 56px;
      padding: 8px 10px;
      background: #0f1729;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      resize: vertical;
      outline: none;
    }

    .capture-section textarea:focus {
      border-color: var(--accent);
    }

    .capture-section textarea::placeholder {
      color: var(--text-muted);
    }

    .btn {
      padding: 8px 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      transition: all 0.2s;
      width: 100%;
      text-align: center;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
    }

    .btn-primary:hover:not(:disabled) {
      background: #06b6d4;
    }

    .btn-success {
      background: var(--green);
      color: #fff;
    }

    .btn-success:hover:not(:disabled) {
      background: #16a34a;
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      border: 1px solid var(--border);
    }

    .btn-ghost:hover {
      background: #1e293b;
      color: var(--text);
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .btn-row .btn {
      flex: 1;
    }

    /* ── Status ── */
    .status {
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      padding: 4px;
      transition: color 0.3s;
      color: var(--text-muted);
    }

    .status.success { color: var(--green); }
    .status.error { color: var(--red); }
    .status.warning { color: var(--orange); }

    /* ── Steps Section ── */
    .steps-section {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .steps-header {
      padding: 10px 12px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 1px solid var(--border);
    }

    .steps-list {
      max-height: 380px;
      overflow-y: auto;
    }

    .steps-list::-webkit-scrollbar {
      width: 4px;
    }

    .steps-list::-webkit-scrollbar-track {
      background: transparent;
    }

    .steps-list::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 24px 12px;
      font-size: 12px;
    }

    .step-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .step-item:hover {
      background: rgba(255, 255, 255, 0.03);
    }

    .step-item:last-child {
      border-bottom: none;
    }

    .step-num {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(34, 211, 238, 0.15);
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 11px;
      flex-shrink: 0;
    }

    .step-info {
      flex: 1;
      min-width: 0;
    }

    .step-desc {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .step-meta {
      font-size: 10px;
      color: var(--text-muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .step-thumb {
      width: 48px;
      height: 30px;
      border-radius: 3px;
      object-fit: cover;
      border: 1px solid var(--border);
      flex-shrink: 0;
      cursor: pointer;
    }

    .step-actions {
      display: flex;
      gap: 2px;
      flex-shrink: 0;
    }

    .step-actions button {
      background: transparent;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 3px;
      border-radius: 3px;
      font-size: 11px;
      line-height: 1;
    }

    .step-actions button:hover {
      background: #1e293b;
      color: var(--text);
    }

    /* ── Actions Section ── */
    .actions-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ── Shortcut Hint ── */
    .shortcut-hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      padding: 4px;
    }

    kbd {
      background: #1e293b;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 10px;
      font-family: var(--mono);
      border: 1px solid #334155;
    }

    /* ── Edit Modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      width: 90%;
      max-width: 320px;
    }

    .modal h3 {
      font-size: 14px;
      margin-bottom: 10px;
    }

    .modal input {
      width: 100%;
      padding: 8px 10px;
      background: #0f1729;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--font);
      font-size: 13px;
      outline: none;
      margin-bottom: 10px;
    }

    .modal input:focus {
      border-color: var(--accent);
    }

    .modal-btns {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .modal-btns .btn {
      width: auto;
      padding: 6px 14px;
      font-size: 12px;
    }

    /* ── Image Preview ── */
    .img-preview {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      z-index: 200;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .img-preview.active {
      display: flex;
    }

    .img-preview img {
      max-width: 95%;
      max-height: 95%;
      border-radius: 8px;
    }

    /* ── Not Connected State ── */
    .not-connected {
      text-align: center;
      padding: 32px 16px;
      color: var(--text-muted);
    }

    .not-connected h3 {
      color: var(--text);
      margin-bottom: 8px;
      font-size: 14px;
    }

    .not-connected p {
      font-size: 12px;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <div class="rec-dot" id="recDot"></div>
      <span class="header-title">Lab Recorder</span>
    </div>
    <span class="step-badge" id="stepBadge">0 steps</span>
  </div>

  <!-- Main content -->
  <div class="content" id="mainContent">

    <!-- Not connected state -->
    <div id="notConnected" class="not-connected" style="display: none;">
      <h3>Not Connected</h3>
      <p>Start the server and begin a recording session from the web UI at <strong>http://localhost:PORT</strong></p>
    </div>

    <!-- Capture Section -->
    <div class="capture-section" id="captureSection">
      <textarea id="stepDesc" placeholder="What did you just do? (e.g., Clicked 'Create a resource')"></textarea>
      <div class="btn-row">
        <button class="btn btn-primary" id="captureBtn">📸 Capture Step</button>
      </div>
    </div>

    <!-- Status -->
    <div class="status" id="status"></div>

    <!-- Steps List -->
    <div class="steps-section">
      <div class="steps-header">Captured Steps</div>
      <div class="steps-list" id="stepsList">
        <div class="empty-state">No steps captured yet.<br>Perform actions, then click Capture.</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="actions-section">
      <button class="btn btn-success" id="generateBtn">✓ Generate Guide</button>
      <button class="btn btn-ghost" id="cancelBtn">Cancel Session</button>
    </div>

    <!-- Shortcut -->
    <div class="shortcut-hint">
      Press <kbd>Ctrl+Shift+C</kbd> to capture quickly
    </div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <h3>Edit Step Description</h3>
      <input id="editInput" placeholder="Step description">
      <div class="modal-btns">
        <button class="btn btn-ghost" id="editCancel">Cancel</button>
        <button class="btn btn-primary" id="editSave">Save</button>
      </div>
    </div>
  </div>

  <!-- Image Preview -->
  <div class="img-preview" id="imgPreview" onclick="this.classList.remove('active')">
    <img id="imgPreviewSrc" src="">
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
